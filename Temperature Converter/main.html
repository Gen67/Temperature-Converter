<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="main.css">
</head>
<body>
    

<div class="temp-layout">
    <div class="temp">
        <h1>Temepature Convertor</h1>
        <label for="">Enter Label: </label>
        <input type="text" id="convert-input" placeholder="Ex. 50">
        <select name="" id="converter">
            <option value="Fahrenheit">Fahrenheit</option>
            <option value="Celsius">Celsius</option>
        </select>
        <button class="convert-btn" onclick="convert()" >Convert</button>
        <div class="result-area">
            <Label id="result">Display Here</Label>
        </div>
    </div>
</div>









<script src="main.js"></script>
</body>
</html>
